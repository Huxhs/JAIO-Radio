<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent | Jaio Radio</title>
  <meta name="description" content="Your message to Jaio Radio was sent successfully." />
  <link rel="canonical" href="https://jaioradio.com/contact-confirmation.html" />
  <link rel="icon" href="logo-j.png" type="image/png" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      -webkit-font-smoothing: antialiased;
    }
    a { color: #00e5ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    :focus-visible { outline: 2px solid #00e5ff; outline-offset: 3px; }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.08);
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      background: rgba(0, 229, 255, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00e5ff;
      font-size: 1.75rem;
    }
    h1 {
      font-family: 'Bebas Neue', cursive;
      font-size: 2.25rem;
      letter-spacing: 2px;
      margin-bottom: 0.75rem;
    }
    p {
      color: #888;
      line-height: 1.7;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.3s;
    }
    .btn-primary {
      background: #00e5ff;
      color: #0a0a0a;
      box-shadow: 0 4px 24px rgba(0, 229, 255, 0.35);
    }
    .btn-primary:hover { transform: translateY(-2px); }
    .btn-ghost {
      color: #888;
      font-size: 0.85rem;
      text-transform: none;
      letter-spacing: 0;
    }
    .version {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #555;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon" aria-hidden="true">✓</div>
    <h1>Message Sent</h1>
    <p>Thanks for reaching out. Your message was delivered and we’ll get back to you as soon as we can.</p>
    <div class="actions">
      <a href="index.html" class="btn btn-primary">Back to Jaio Radio</a>
      <a href="index.html#music" class="btn btn-ghost">Listen to latest tracks</a>
    </div>
    <p class="version">Jaio Radio v1.0.2</p>
  </main>
</body>
</html>
